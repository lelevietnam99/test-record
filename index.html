<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Ghi Âm Tạm Thời</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 25px;
        }
        .controls {
            margin-bottom: 20px;
        }
        
        /* Giao diện nút bấm mặc định (Màu xanh) */
        button {
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            background-color: #28a745; 
            box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3);
            transition: all 0.3s ease;
            outline: none;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(40, 167, 69, 0.4);
        }
        
        button:active {
            transform: translateY(1px);
        }

        /* Trạng thái khi đang ghi âm (Màu đỏ + Hiệu ứng nhấp nháy) */
        button.recording {
            background-color: #dc3545;
            box-shadow: 0 4px 6px rgba(220, 53, 69, 0.3);
            animation: pulse 1.5s infinite;
        }
        
        button.recording:hover {
            box-shadow: 0 6px 8px rgba(220, 53, 69, 0.4);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.6); }
            70% { box-shadow: 0 0 0 12px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }

        audio {
            width: 100%;
            margin-top: 20px;
            outline: none;
        }
        .status {
            margin-top: 15px;
            font-size: 15px;
            color: #666;
            height: 20px;
            transition: color 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trạm Ghi Âm</h2>
    <div class="controls">
        <button id="recordToggleBtn">Bắt đầu ghi âm</button>
    </div>
    <div class="status" id="statusText">Sẵn sàng...</div>
    
    <audio id="audioPlayback" controls></audio>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let stream;

    const recordToggleBtn = document.getElementById('recordToggleBtn');
    const audioPlayback = document.getElementById('audioPlayback');
    const statusText = document.getElementById('statusText');

    recordToggleBtn.addEventListener('click', async () => {
        if (!isRecording) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    
                    // --- ĐIỂM MỚI: Tự động phát âm thanh ---
                    audioPlayback.play().catch(e => {
                        console.log("Trình duyệt chặn tự động phát:", e);
                    });
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                
                recordToggleBtn.textContent = 'Dừng ghi âm';
                recordToggleBtn.classList.add('recording');
                statusText.textContent = '⏺ Đang ghi âm...';
                statusText.style.color = '#dc3545';
                statusText.style.fontWeight = 'bold';

            } catch (err) {
                console.error('Lỗi truy cập micro:', err);
                alert('Không thể truy cập micro. Vui lòng kiểm tra quyền của trình duyệt!');
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            
            recordToggleBtn.textContent = 'Bắt đầu ghi âm';
            recordToggleBtn.classList.remove('recording');
            statusText.textContent = 'Đang phát lại bản ghi...';
            statusText.style.color = '#28a745';
            statusText.style.fontWeight = 'normal';
        }
    });
</script>

</body>
</html>
