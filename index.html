<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Ghi Âm Tạm Thời</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#28a745">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
            /* Thêm padding dưới để nội dung không bị nút che mất */
            padding-bottom: 100px; 
            box-sizing: border-box;
        }
        
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        h2 {
            color: #333;
            margin-top: 0;
            margin-bottom: 20px;
        }
        
        audio {
            width: 100%;
            margin-top: 20px;
            outline: none;
        }
        
        .status {
            margin-top: 15px;
            font-size: 15px;
            color: #666;
            height: 20px;
            transition: color 0.3s;
        }

        /* --- CSS MỚI CHO NÚT GHI ÂM TRÒN VÀ NẰM DƯỚI ĐÁY --- */
        .controls {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }
        
        button {
            width: 110px;        /* Độ rộng của nút */
            height: 110px;       /* Chiều cao bằng độ rộng để tạo hình vuông */
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50%;  /* Biến hình vuông thành hình tròn */
            cursor: pointer;
            color: white;
            background-color: #28a745; 
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.4);
            transition: all 0.3s ease;
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        button:hover {
            transform: scale(1.05); /* Phóng to nhẹ khi di chuột */
            box-shadow: 0 12px 25px rgba(40, 167, 69, 0.5);
        }
        
        button:active {
            transform: scale(0.95); /* Lõm xuống khi bấm */
        }

        button.recording {
            background-color: #dc3545;
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.4);
            animation: pulse 1.5s infinite;
        }
        
        button.recording:hover {
            box-shadow: 0 12px 25px rgba(220, 53, 69, 0.5);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Trạm Ghi Âm</h2>
    <div class="status" id="statusText">Sẵn sàng...</div>
    <audio id="audioPlayback" controls></audio>
</div>

<div class="controls">
    <button id="recordToggleBtn">BẮT ĐẦU</button>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('ServiceWorker đăng ký thành công');
                })
                .catch(err => {
                    console.log('ServiceWorker đăng ký thất bại: ', err);
                });
        });
    }

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;
    let stream;

    const recordToggleBtn = document.getElementById('recordToggleBtn');
    const audioPlayback = document.getElementById('audioPlayback');
    const statusText = document.getElementById('statusText');

    recordToggleBtn.addEventListener('click', async () => {
        if (!isRecording) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    
                    audioPlayback.play().catch(e => {
                        console.log("Trình duyệt chặn tự động phát:", e);
                    });
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                
                // Cập nhật chữ ngắn gọn cho vừa hình tròn
                recordToggleBtn.textContent = 'DỪNG';
                recordToggleBtn.classList.add('recording');
                statusText.textContent = '⏺ Đang ghi âm...';
                statusText.style.color = '#dc3545';
                statusText.style.fontWeight = 'bold';

            } catch (err) {
                console.error('Lỗi truy cập micro:', err);
                alert('Không thể truy cập micro. Vui lòng kiểm tra quyền của trình duyệt!');
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            
            // Cập nhật chữ ngắn gọn
            recordToggleBtn.textContent = 'BẮT ĐẦU';
            recordToggleBtn.classList.remove('recording');
            statusText.textContent = 'Đang phát lại bản ghi...';
            statusText.style.color = '#28a745';
            statusText.style.fontWeight = 'normal';
        }
    });
</script>

</body>
</html>
